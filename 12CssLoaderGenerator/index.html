<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CSS Loader Generator</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <header class="header">
      <p>⏳ WebTools #12</p>
      <h1>CSS Loader Generator</h1>
      <span>Create animated CSS loaders with live preview and instant code copy.</span>
    </header>

    <section class="generator">
      <aside class="controls">
        <div class="control">
          <label for="loaderType">Loader Type</label>
          <select id="loaderType">
            <option value="spinner">Spinner</option>
            <option value="dots">Dots</option>
            <option value="pulse">Pulse</option>
            <option value="bars">Bars</option>
            <option value="ring">Ring</option>
            <option value="orbit">Orbit</option>
          </select>
        </div>

        <div class="control">
          <label for="loaderColor">Color</label>
          <input type="color" id="loaderColor" value="#38bdf8">
        </div>

        <div class="control">
          <label>Size <span id="sizeValue">80px</span></label>
          <input type="range" id="loaderSize" min="30" max="160" value="80">
        </div>

        <div class="control">
          <label>Speed <span id="speedValue">1.00s</span></label>
          <input type="range" id="loaderSpeed" min="0.4" max="3" step="0.1" value="1">
        </div>

        <div class="control">
          <label>Thickness <span id="thicknessValue">8px</span></label>
          <input type="range" id="loaderThickness" min="3" max="20" value="8">
        </div>

        <div class="preset-section">
          <h2>Quick Presets</h2>

          <div class="preset-grid">
            <button data-preset="spinner">Spinner</button>
            <button data-preset="dots">Dots</button>
            <button data-preset="pulse">Pulse</button>
            <button data-preset="bars">Bars</button>
            <button data-preset="ring">Ring</button>
            <button data-preset="orbit">Orbit</button>
            <button data-preset="random">Random</button>
          </div>
        </div>
      </aside>

      <section class="preview-panel">
        <div class="preview-area">
          <div id="loaderPreview"></div>
        </div>

        <div class="code-card">
          <div class="code-top">
            <span>Generated Code</span>

            <div class="copy-buttons">
              <button id="copyHtmlBtn">Copy HTML</button>
              <button id="copyCssBtn">Copy CSS</button>
            </div>
          </div>

          <pre id="htmlOutput"></pre>
          <pre id="cssOutput"></pre>

          <p class="message" id="message"></p>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
