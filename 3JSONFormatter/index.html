<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>JSON Formatter</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <div class="header">
      <h1>🧩 JSON Formatter</h1>
      <p>Format, validate and beautify your JSON instantly.</p>
    </div>

    <div class="editor-grid">
      <div class="editor-box">
        <div class="editor-top">
          <span>Input JSON</span>
          <button id="pasteBtn">Paste</button>
        </div>

        <div class="textarea-wrapper" id="inputWrapper">
          <div class="error-line-highlight" id="errorLine"></div>

          <textarea
            id="input"
            placeholder='{"name":"John","age":25}'
            spellcheck="false"
          ></textarea>
        </div>
      </div>

      <div class="editor-box">
        <div class="editor-top">
          <span>Formatted Output</span>
          <button id="copyBtn">Copy</button>
        </div>

        <textarea
          id="output"
          readonly
          spellcheck="false"
        ></textarea>
      </div>
    </div>

    <div class="buttons">
      <button id="formatBtn">Format JSON</button>
      <button id="minifyBtn">Minify JSON</button>
      <button id="clearBtn">Clear</button>
    </div>

    <div class="status" id="status">
      Waiting for JSON input...
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
